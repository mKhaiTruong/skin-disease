[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "skin-core"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "pyyaml",
    "python-box",
    "ensure",
    "joblib",
    "numpy",
    "pandas",
    "scipy",
    "boto3",
    "fastapi",
    "uvicorn",
    "prometheus-client",
    "httpx",
    "python-dotenv",
]

[tool.setuptools.packages.find]
where = ["src"]
include = ["core*"]