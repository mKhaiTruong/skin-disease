[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "skin-transformation"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "skin-core",
    "albumentations",
    "pillow",
    "numpy",
    "pandas",
]

[tool.setuptools.packages.find]
where = ["src"]
include = ["transformation*"]