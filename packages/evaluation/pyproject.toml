[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "skin-evaluation"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "skin-core",
    "skin-vision",
    "scikit-learn",
    "matplotlib",
    "seaborn",
    "opencv-python",
]

[tool.setuptools.packages.find]
where = ["src"]
include = ["evaluation*"]