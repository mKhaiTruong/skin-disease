[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "skin-ingestion"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "skin-core",
    "kaggle",
    "python-dotenv>=1.0.0",
]

[tool.setuptools.packages.find]
where = ["src"]
include = ["ingestion*"]