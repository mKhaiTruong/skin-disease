apiVersion: apps/v1
kind: Deployment
metadata:
  name: vision-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vision-service
  template:
    metadata:
      labels:
        app: vision-service
    spec:
      containers:
        - name: vision-service
          image: vision-service:dev
          imagePullPolicy: Never
          envFrom:
            - secretRef:
                name: vision-secrets
          ports:
            - containerPort: 7860
---
apiVersion: v1
kind: Service
metadata:
  name: vision-service
spec:
  selector:
    app: vision-service
  ports:
    - port: 7860
      targetPort: 7860
